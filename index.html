<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="etilos/style.css">
    <link rel="stylesheet" href="etilos/media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem"></div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a). Faça login para acessar sua conta!
                </p>
                <form action="" method="post">
                    <div class="campo">
                        <span class="material-symbols-outlined">
                           person
                        </span>
                        <input type="email" name="login"id="ilogin" placeholder="seu e-mail"    autocomplete="email" required>
                        <label for="ilogin">Login</label>
                    </div>
                    <div class="campo">
                       <span class="material-symbols-outlined">
                             key 
                        </span>
                        <input type="password" name="senha" id="isenha" placeholder="sua senha" autocomplete="current-password" required minlength="6" maxlength="16">
                        <label for="isenha">Senha</label>
                    </div>
                    <input type="submit" value="Entrar">
                    <a href="esqueci.html" class="botao">Esqueci a senha  <i class="material-symbols-outlined">Mail</i></a>
                </form>
            </div>
        </section>

    </main>
</body>
</html>
